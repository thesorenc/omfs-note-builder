name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # Fail on known-high-severity advisories in the dependency tree (supply-chain gate).
      - run: npm audit --audit-level=high
      - run: npm run lint
      - run: npm test
      # Vault is not present in CI; build:content --check skips drift and the build
      # uses the committed JSON. (Run build:content locally when templates change.)
      - run: npm run build:content -- --check
      - run: npm run build
